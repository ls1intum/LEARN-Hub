name: Test

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            client:
              - "client/**"
              - ".github/workflows/test.yml"
            server:
              - "server/**"
              - ".github/workflows/test.yml"

  test-server:
    name: Test Server
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # CI runs on Java 21, which Byte Buddy/Mockito fully supports, so the
      # local-only -Dnet.bytebuddy.experimental=true flag is not needed here.
      - name: Run tests
        run: ./mvnw -B test

      - name: Upload surefire reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: server/target/surefire-reports/
          retention-days: 7

  test-client:
    name: Test Client
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run
