# Application Configuration
spring.application.name=learn-hub-server

# Config
spring.config.import=optional:file:../.env[.properties]

# Server Configuration
server.port=${SERVER_PORT:5001}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# Trust X-Forwarded-* headers from the nginx reverse proxy
server.forward-headers-strategy=FRAMEWORK

# Environment (local, staging, production)
app.environment=${ENVIRONMENT:local}

# Database Configuration
spring.datasource.url=${POSTGRES_DB_URI:jdbc:postgresql://localhost:5432/learn_hub_activities}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

app.initial-admin-email=${INITIAL_ADMIN_EMAIL:}
app.initial-admin-password=${INITIAL_ADMIN_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
# Serialize/deserialise dates in UTC
spring.jackson.time-zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# Spring AI Configuration (OpenAI client against Ollama-compatible endpoint)
# NOTE: Spring AI 2.0 drives OpenAI through the official OpenAI SDK, which appends
# "/chat/completions" to base-url verbatim (the old completions-path that added the
# "/v1" prefix is gone). base-url must therefore include the "/v1" API root, e.g.
# http://localhost:11434/v1 or https://<host>/ollama/v1.
spring.ai.model.chat=openai
spring.ai.openai.base-url=${LLM_BASE_URL:https://ase-se03.openai.azure.com/openai/v1/}
spring.ai.openai.api-key=${LLM_API_KEY:}
spring.ai.openai.chat.options.model=${LLM_MODEL_NAME:gpt-4.1}
spring.ai.openai.chat.options.temperature=${LLM_TEMPERATURE:0.0}
# OpenAI image model for replacing [[IMAGE_PLACEHOLDER: ...]] markers in generated exercise sheets.
# Spring AI 2.0 builds the image client from the shared spring.ai.openai.base-url /
# api-key above, so the image model reuses the same endpoint and key as chat — only
# the image-specific options below differ. The exercise image model is enabled when
# LLM_API_KEY and an image model name (LLM_IMAGE_MODEL_NAME) are provided.
spring.ai.model.image=openai
spring.ai.openai.image.options.model=${LLM_IMAGE_MODEL_NAME:gpt-image-1.5}
spring.ai.openai.image.options.size=${LLM_IMAGE_SIZE:1536x1024}
spring.ai.openai.image.options.quality=${LLM_IMAGE_QUALITY:medium}
spring.ai.openai.image.options.user=${LLM_IMAGE_USER:learn-hub}
spring.http.client.factory=simple
spring.http.client.connect-timeout=10s
spring.http.client.read-timeout=${HTTP_READ_TIMEOUT:600s}
app.markdown-generation.max-concurrency=${MARKDOWN_GENERATION_MAX_CONCURRENCY:2}

# Session Authentication
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
server.servlet.session.timeout=${SESSION_TIMEOUT:7d}
server.servlet.session.cookie.name=LEARNHUBSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.max-age=${SESSION_COOKIE_MAX_AGE:7d}
app.client.allowed-origins=${CLIENT_ALLOWED_ORIGINS:}
app.auth.always-remember=${ALWAYS_REMEMBER:true}

# Email Configuration
spring.mail.host=${SMTP_SERVER:postout.lrz.de}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${EMAIL_USERNAME:your_email@example.com}
spring.mail.password=${EMAIL_PASSWORD:your_email_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false
email.from-address=${EMAIL_ADDRESS:your_email@example.com}
email.from-name=${EMAIL_SENDER_NAME:LEARN-Hub Team}

# Multipart file upload limits (service-level validation enforces stricter limits per endpoint)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# PDF Storage Configuration
pdf.storage.path=${PDF_PATH:/app/data/pdfs}

# DOCX cache (converted files stored here to avoid redundant Adobe API calls)
learnhub.docx.cache.path=${DOCX_CACHE_PATH:/app/data/docx-cache}

# Adobe PDF Services (PDF-to-DOCX conversion)
learnhub.adobe.client-id=${ADOBE_PDF_SERVICES_CLIENT_ID:}
learnhub.adobe.client-secret=${ADOBE_PDF_SERVICES_CLIENT_SECRET:}

# Security Configuration
spring.security.debug=false

# OpenAPI Configuration
springdoc.api-docs.path=/api/openapi
springdoc.swagger-ui.path=/api/openapi/swagger
springdoc.swagger-ui.operationsSorter=method

# Logging
# Verbose logging: set VERBOSE_LOGGING=true env var to enable DEBUG-level service and framework logging.
# See logback-spring.xml for full configuration.
app.verbose-logging=${VERBOSE_LOGGING:false}
logging.level.com.learnhub=INFO
