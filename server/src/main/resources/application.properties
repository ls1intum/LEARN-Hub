# Application Configuration
spring.application.name=learn-hub-server

# Config
spring.config.import=optional:file:../.env[.properties]

# Server Configuration
server.port=${SERVER_PORT:5001}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Environment (local, staging, production)
app.environment=${ENVIRONMENT:local}

# Database Configuration
spring.datasource.url=${POSTGRES_DB_URI:jdbc:postgresql://localhost:5432/learn_hub_activities}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

app.db-seed.enabled=${DB_SEED_ENABLED:false}
app.initial-admin-email=${INITIAL_ADMIN_EMAIL:}
app.initial-admin-password=${INITIAL_ADMIN_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
# Serialize/deserialise dates in UTC
spring.jackson.time-zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# Spring AI Configuration (OpenAI client against Ollama-compatible endpoint)
spring.ai.model.chat=openai
spring.ai.openai.base-url=${LLM_BASE_URL:http://localhost:11434}
spring.ai.openai.api-key=${LLM_API_KEY:}
spring.ai.openai.chat.options.model=${LLM_MODEL_NAME:qwen3:30b-a3b}
spring.ai.openai.chat.options.temperature=${LLM_TEMPERATURE:0.0}
# Visual model for exercise/solution sheet generation (optional).
# If set, overrides LLM_MODEL_NAME for Übung/Lösungsblatt calls and enables image input.
llm.visual.model=${LLM_MODEL_VISUAL:}
llm.visual.max-tokens=${LLM_VISUAL_MAX_TOKENS:8000}
llm.visual.max-pages=${LLM_VISUAL_MAX_PAGES:50}
llm.visual.dpi=${LLM_VISUAL_DPI:72}
# Azure image model for replacing [[IMAGE_PLACEHOLDER: ...]] markers in generated exercise sheets.
spring.ai.azure.openai.endpoint=${LLM_IMAGE_AZURE_ENDPOINT:https://ase-se03.openai.azure.com/}
spring.ai.azure.openai.api-key=${LLM_IMAGE_AZURE_API_KEY:}
spring.ai.azure.openai.chat.enabled=false
spring.ai.azure.openai.embedding.enabled=false
spring.ai.azure.openai.audio.transcription.enabled=false
spring.ai.azure.openai.image.enabled=true
spring.ai.azure.openai.image.options.deployment-name=${LLM_IMAGE_AZURE_DEPLOYMENT_NAME:gpt-image-1.5}
spring.ai.azure.openai.image.options.model=${LLM_IMAGE_AZURE_MODEL_NAME:gpt-image-1.5}
spring.ai.azure.openai.image.options.width=${LLM_IMAGE_AZURE_WIDTH:1536}
spring.ai.azure.openai.image.options.height=${LLM_IMAGE_AZURE_HEIGHT:1024}
spring.ai.azure.openai.image.options.quality=${LLM_IMAGE_AZURE_QUALITY:medium}
spring.ai.azure.openai.image.options.user=${LLM_IMAGE_AZURE_USER:learn-hub}
spring.http.client.factory=simple
spring.http.client.connect-timeout=10s
spring.http.client.read-timeout=${HTTP_READ_TIMEOUT:600s}
app.markdown-generation.max-concurrency=${MARKDOWN_GENERATION_MAX_CONCURRENCY:2}

# JWT Configuration (provide at least 32 bytes through JWT_SECRET_KEY)
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Email Configuration
spring.mail.host=${SMTP_SERVER:postout.lrz.de}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${EMAIL_USERNAME:your_email@example.com}
spring.mail.password=${EMAIL_PASSWORD:your_email_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false
email.from-address=${EMAIL_ADDRESS:your_email@example.com}
email.from-name=${EMAIL_SENDER_NAME:LEARN-Hub Team}

# Multipart file upload limits (service-level validation enforces stricter limits per endpoint)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# PDF Storage Configuration
pdf.storage.path=${PDF_PATH:/app/data/pdfs}

# Adobe PDF Services (PDF-to-DOCX conversion)
learnhub.adobe.client-id=${ADOBE_PDF_SERVICES_CLIENT_ID}
learnhub.adobe.client-secret=${ADOBE_PDF_SERVICES_CLIENT_SECRET}

# Security Configuration
spring.security.debug=false

# CORS Configuration
cors.allowed-origins=*

# OpenAPI Configuration
springdoc.api-docs.path=/api/openapi
springdoc.swagger-ui.path=/api/openapi/swagger
springdoc.swagger-ui.operationsSorter=method

# Logging
# Verbose logging: set VERBOSE_LOGGING=true env var to enable DEBUG-level service and framework logging.
# See logback-spring.xml for full configuration.
app.verbose-logging=${VERBOSE_LOGGING:false}
logging.level.com.learnhub=INFO
